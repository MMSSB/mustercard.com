<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MUSTER - Settings</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <div class="logo-section">
                <img src="must.png" alt="MUSTER" onerror="this.src='https://upload.wikimedia.org/wikipedia/en/2/23/Misr_University_for_Science_and_Technology_logo.png'">
                <h1>MUSTER</h1>
            </div>
            <div class="notification" id="myBtn" style="cursor: pointer;">
                <span class="material-icons">notifications</span>
                <span class="badge">1</span>
            </div>
        </header>

        <div style="padding-top: 20px;">
            <div class="settings-section">
                <div class="settings-header">APPEARANCE</div>
                <div class="settings-group">
                    <div class="setting-item">
                        <div class="setting-item-left">
                            <div class="setting-icon"><i class="ri-moon-line"></i></div>
                            <div class="setting-text">
                                <h4>Dark Mode</h4>
                                <p id="dark-mode-text">Light theme enabled</p>
                            </div>
                        </div>
                        <label class="switch">
                            <input type="checkbox" id="dark-mode-toggle">
                            <span class="slider"></span>
                        </label>
                    </div>
                </div>
            </div>

            <div class="settings-section">
                <div class="settings-header">ACCOUNT (PROFILE MAKER)</div>
                <div class="settings-group" style="padding-bottom: 10px;">
                    <div class="profile-maker-form">
                        <div class="form-group">
                            <label>Profile Image</label>
                            <div class="image-preview-container">
                                <img id="form-preview-img" src="picture.png" alt="Preview">
                                <input type="file" id="form-image" accept="image/*">
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Full Name</label>
                            <input type="text" id="form-name" placeholder="...">
                        </div>
                        <div class="form-group">
                            <label>Student ID</label>
                            <input type="text" id="form-id" placeholder="\">
                        </div>
                        <div class="form-group">
                            <label>CGPA</label>
                            <input type="text" id="form-cgpa" placeholder="">
                        </div>
                        <div class="form-group">
                            <label>Semester</label>
                            <input type="text" id="form-semester" placeholder="Spring-2026">
                        </div>
                        <div class="form-group">
                            <label>Credit Hours (e.g. 150/165)</label>
                            <input type="text" id="form-credits" placeholder="0/165">
                        </div>
                        <div class="form-group">
                            <label>Rank (Number only)</label>
                            <input type="text" id="form-rank" placeholder="1">
                        </div>
                        <button id="save-profile" class="save-btn">Save Fake Data</button>
                    </div>
                </div>
            </div>
            <div style="height: 60px;"></div>
        </div>

    </div>
